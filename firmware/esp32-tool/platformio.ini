; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = jc3248w535

[env:jc3248w535]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_mode = dio
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
upload_speed = 921600
lib_deps =
	h2zero/NimBLE-Arduino@^2.1.1
	SD_MMC
	lvgl/lvgl@^8.4.0
	terrorsl/sMQTTBroker@^0.1.8
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	https://github.com/me-no-dev/AsyncTCP.git
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM
	-DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
	-DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
	-DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=3
	-DLV_CONF_INCLUDE_SIMPLE
	-Isrc
	-Isrc/drivers
	-Isrc/ui
	; JC3248W535 pin definitions
	-DHAS_DISPLAY
	-DJC3248W535
	-DLCD_CS=45
	-DLCD_SCK=47
	-DLCD_SDA0=21
	-DLCD_SDA1=48
	-DLCD_SDA2=40
	-DLCD_SDA3=39
	-DLCD_TE=38
	-DLCD_RST=-1
	-DLCD_BL=1
	-DTOUCH_SDA=4
	-DTOUCH_SCL=8
	-DTOUCH_INT=3
	-DTOUCH_RST=-1
	-DSD_MMC_D0=13
	-DSD_MMC_CLK=12
	-DSD_MMC_CMD=11
	-DAUDIO_BCK=42
	-DAUDIO_LRCK=2
	-DAUDIO_DO=41
	-DBAT_ADC=5
extra_scripts = pre:force_rebuild_main.py

; OTA upload via home WiFi (ESP32 connects as STA):
;   pio run -e ota -t upload
; Uses mDNS — works from any device on the same home network.
; Falls back to AP IP (10.0.0.1) if not on home WiFi.
[env:ota]
extends = env:jc3248w535
upload_protocol = custom
upload_port = http://nova-ota.local/api/esp-ota
extra_scripts =
	pre:force_rebuild_main.py
	ota_upload.py

; OTA via AP network (when not on home WiFi)
[env:ota-ap]
extends = env:ota
upload_port = http://10.0.0.1/api/esp-ota

; ── Headless ESP32-S3 (no display) — wizard via web UI only ──────────────────
; Build: pio run -e headless
; Flash: pio run -e headless -t upload
; SD card pins default to same as JC3248W535 — override with build_flags if different
[env:headless]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_mode = dio
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
upload_speed = 921600
lib_deps =
	h2zero/NimBLE-Arduino@^2.1.1
	SD_MMC
	terrorsl/sMQTTBroker@^0.1.8
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	https://github.com/me-no-dev/AsyncTCP.git
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM
	-DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
	-DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
	-DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=3
	-Isrc
	-Isrc/ui
	-DSD_MMC_D0=13
	-DSD_MMC_CLK=12
	-DSD_MMC_CMD=11
build_src_filter = +<*> -<drivers/> -<ui/display.cpp> -<ui/fonts/> -<ui/*.c>
extra_scripts = pre:force_rebuild_main.py

; ── ESP32-C3 Mini (no display, no SD, no PSRAM) — firmware via proxy ─────────
; Build: pio run -e esp32c3
; Flash: pio run -e esp32c3 -t upload
; Provisioning + OTA via web wizard, firmware streamed from remote server
[env:esp32c3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
board_build.flash_mode = dio
board_build.partitions = huge_app.csv
monitor_speed = 115200
upload_speed = 921600
lib_deps =
	h2zero/NimBLE-Arduino@^2.1.1
	terrorsl/sMQTTBroker@^0.1.8
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	https://github.com/me-no-dev/AsyncTCP.git
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
	-DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
	-DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=3
	-Isrc
	-Isrc/ui
build_src_filter = +<*> -<drivers/> -<ui/display.cpp> -<ui/fonts/> -<ui/*.c>
