; PlatformIO Project Configuration
; Open-source STM32F407 motor controller firmware for Novabot mower
;
; MCU: STM32F407VGT6 (168MHz Cortex-M4F, 1MB Flash, 192KB RAM)
; Framework: STM32Cube HAL
;
; Build:   pio run
; Upload:  pio run --target upload
; Monitor: pio device monitor

[env:novabot_chassis]
platform = ststm32
board = disco_f407vg
framework = stm32cube

; Clock: 168 MHz (HSE 8MHz -> PLL)
board_build.f_cpu = 168000000L

; Upload via onboard CH340 USB-serial (UART bootloader)
; Set BOOT0 jumper HIGH before flashing, then reset.
; After flashing: set BOOT0 back to LOW and reset to run firmware.
upload_protocol = serial
upload_speed = 115200

; Debug via ST-Link (if available)
debug_tool = stlink

; Build flags
build_flags =
    -DSTM32F407xx
    -DUSE_HAL_DRIVER
    -DHSE_VALUE=8000000
    -Os
    -Wall
    -Wextra

; Serial monitor via CH340
monitor_speed = 115200
