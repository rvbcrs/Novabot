; Nova-OTA Device — ESP32 standalone provisioning + OTA flash tool
;
; All-in-one device that provisions Novabot mowers via BLE,
; serves as WiFi AP + DNS + MQTT broker, and pushes custom firmware.
;
; Hardware: ESP32-S3 (BLE 5.0 + WiFi) with SD card for firmware storage
; Or: ESP32-WROOM with SD card module
;
; Build: pio run
; Upload: pio run --target upload
; Monitor: pio device monitor

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.partitions = huge_app.csv
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    ; BLE
    h2zero/NimBLE-Arduino@^2.1.1
    ; SD card
    SD
    SPI
    ; DNS captive portal
    DNSServer

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=3

; Waveshare ESP32-S3 Touch LCD 2" (ST7789T3 + CST816D)
[env:waveshare_lcd2]
platform = espressif32 @ 6.4.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_mode = dio
board_build.partitions = huge_app.csv
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    ; BLE
    h2zero/NimBLE-Arduino@^2.1.1
    ; SD card
    SD
    SPI
    ; DNS captive portal
    DNSServer
    ; Display
    lovyan03/LovyanGFX@^1.1.16

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=3
    ; Waveshare ESP32-S3-Touch-LCD-2 pin defines (from official demo)
    -DLCD_MOSI=38
    -DLCD_MISO=40
    -DLCD_SCLK=39
    -DLCD_CS=45
    -DLCD_DC=42
    -DLCD_RST=-1
    -DLCD_BL=1
    -DTOUCH_SDA=48
    -DTOUCH_SCL=47
    -DTOUCH_INT=-1
    -DTOUCH_RST=-1
    -DSD_CS=41
    -DWAVESHARE_LCD

; Also support regular ESP32-WROOM
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = huge_app.csv
monitor_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino@^2.1.1
    SD
    SPI
    DNSServer
    WebServer

build_flags =
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=3
